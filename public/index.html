<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HuffmanEncryptor</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <h1>2B Huffman Encryption</h1>
    <!--Set up the division for the user to encode and decode-->

    <!--Side bar for history-->
    <!--make prettier later-->
    <div class="w3-sidebar w3-bar-block w3-collapse w3-card" style="display: none;" id="mySide">
        <button class="w3-bar-item w3-button w3-hide-large" onclick="w3_close()">
            Close &times;
        </button>
    </div>

    <div class="w3-teal">
        <button class="w3-button w3-teal w3-xlarge" onclick="w3_open()">&#9776;</button>
    </div>

    <!--For now just except one File for each option-->
    <div class = "flexcontainer">
        <div class="containerfChild">
            <p>Upload Spreadsheets here</p>
            <div id="Encryption" class="drop-zone">
                <input type = "file" id="eFileDrop" name ="myfile" accept=".csv"> <!--Check if the name messes it up later for fstream management-->
            </div>
            <button type="button" id="encodeBut">Encode Spreadsheet!</button>
            
        </div>
            <div class="containerfChild">
            <p>Upload Encrypted files here</p>
            <div id="Decryption" class="drop-zone">
                <input type = "file" id="dFileDrop" name ="myfile" accept=".txt"> <!--Check if the name messes it up later for fstream management-->
            </div>
            <button type="button" id="decodeBut">Decode Spreadsheet!</button>
        </div>
    </div>
    <div class="imageRes hidden" id="hiddenHuffman">
        <h1>Your Huffman Download</h1>
        <!--Hidden link will be here-->
        <a href="code.png" id="downloadPlace">Download here!</a>
    </div>



</body>
</html>
